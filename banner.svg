<svg viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" width="680" height="280">
  <defs>
    <style>
      .bg{fill:#0d1117}
      .gl{stroke:#1e2a1e;stroke-width:.5}
      @keyframes fadeInUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
      @keyframes drawLine{from{stroke-dashoffset:300}to{stroke-dashoffset:0}}
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
      @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
      .a1{animation:fadeInUp .6s ease .2s both}
      .a2{animation:fadeInUp .6s ease .5s both}
      .a3{animation:fadeInUp .4s ease 1.4s both}
      .a4{animation:fadeInUp .4s ease 1.6s both}
      .a5{animation:fadeInUp .4s ease 1.8s both}
      .t1{animation:fadeInUp .5s ease .7s both}
      .t2{animation:fadeInUp .5s ease .85s both}
      .t3{animation:fadeInUp .5s ease 1s both}
      .t4{animation:fadeInUp .5s ease 1.15s both}
      .k1{animation:fadeInUp .5s ease .8s both}
      .k2{animation:fadeInUp .5s ease 1s both}
      .k3{animation:fadeInUp .5s ease 1.2s both}
      .ch{animation:fadeInUp .6s ease 1s both}
      .ln{stroke-dasharray:300;stroke-dashoffset:300;animation:drawLine 1.8s ease 1.2s both}
      .b1{animation:fadeInUp .4s ease 1s both}
      .b2{animation:fadeInUp .4s ease 1.1s both}
      .b3{animation:fadeInUp .4s ease 1.2s both}
      .b4{animation:fadeInUp .4s ease 1.3s both}
      .cr{animation:blink 1s step-end infinite}
      .pg{animation:pulse 2s ease-in-out 2s infinite}
    </style>
  </defs>

  <rect class="bg" width="680" height="280"/>
  <line class="gl" x1="0" y1="50"  x2="680" y2="50"/>
  <line class="gl" x1="0" y1="100" x2="680" y2="100"/>
  <line class="gl" x1="0" y1="150" x2="680" y2="150"/>
  <line class="gl" x1="0" y1="200" x2="680" y2="200"/>
  <line class="gl" x1="0" y1="250" x2="680" y2="250"/>
  <rect x="0" y="0" width="3" height="280" fill="#1D9E75"/>

  <g class="a1"><text x="30" y="46" font-family="monospace" font-size="11" fill="#1D9E75" letter-spacing="2">DATA ANALYST</text></g>
  <g class="a2"><text x="30" y="80" font-family="monospace" font-size="26" font-weight="700" fill="#e6edf3">Mohamed Hamed</text></g>

  <g class="a3">
    <text x="30"  y="108" font-family="monospace" font-size="11" fill="#5DCAA5">python</text>
    <text x="78"  y="108" font-family="monospace" font-size="11" fill="#7d8590">|</text>
    <text x="88"  y="108" font-family="monospace" font-size="11" fill="#5DCAA5">sql</text>
    <text x="113" y="108" font-family="monospace" font-size="11" fill="#7d8590">|</text>
    <text x="123" y="108" font-family="monospace" font-size="11" fill="#5DCAA5">power_bi</text>
    <text x="187" y="108" font-family="monospace" font-size="11" fill="#7d8590">|</text>
    <text x="197" y="108" font-family="monospace" font-size="11" fill="#5DCAA5">excel</text>
  </g>
  <g class="a4">
    <text x="30" y="130" font-family="monospace" font-size="11" fill="#EF9F27">skills</text>
    <text x="72" y="130" font-family="monospace" font-size="11" fill="#e6edf3"> = [EDA, Clustering, Dashboards, Storytelling]</text>
  </g>
  <g class="a5">
    <text x="30"  y="152" font-family="monospace" font-size="11" fill="#EF9F27">goal</text>
    <text x="60"  y="152" font-family="monospace" font-size="11" fill="#e6edf3">   = </text>
    <text x="84"  y="152" font-family="monospace" font-size="11" fill="#9FE1CB">"Turn raw data into real decisions"</text>
    <text x="337" y="152" font-family="monospace" font-size="13" fill="#1D9E75" class="cr">_</text>
  </g>

  <g class="t1"><rect x="30"  y="168" width="84" height="20" rx="4" fill="#1e2a1e" stroke="#1D9E75" stroke-width="0.5"/><text x="72"  y="182" text-anchor="middle" font-family="monospace" font-size="10" fill="#1D9E75">Power BI</text></g>
  <g class="t2"><rect x="122" y="168" width="84" height="20" rx="4" fill="#1e2a1e" stroke="#1D9E75" stroke-width="0.5"/><text x="164" y="182" text-anchor="middle" font-family="monospace" font-size="10" fill="#1D9E75">Python</text></g>
  <g class="t3"><rect x="214" y="168" width="84" height="20" rx="4" fill="#1e2a1e" stroke="#1D9E75" stroke-width="0.5"/><text x="256" y="182" text-anchor="middle" font-family="monospace" font-size="10" fill="#1D9E75">SQL</text></g>
  <g class="t4"><rect x="306" y="168" width="84" height="20" rx="4" fill="#1e2a1e" stroke="#1D9E75" stroke-width="0.5"/><text x="348" y="182" text-anchor="middle" font-family="monospace" font-size="10" fill="#1D9E75">Excel</text></g>

  <g class="k1">
    <rect x="430" y="20" width="110" height="56" rx="6" fill="#161b22" stroke="#1D9E75" stroke-width="0.5" opacity="0.8"/>
    <text x="485" y="42" text-anchor="middle" font-family="monospace" font-size="9"  fill="#7d8590">PROJECTS</text>
    <text x="485" y="64" text-anchor="middle" font-family="monospace" font-size="22" font-weight="700" fill="#1D9E75">20+</text>
  </g>
  <g class="k2">
    <rect x="550" y="20" width="110" height="56" rx="6" fill="#161b22" stroke="#5DCAA5" stroke-width="0.5" opacity="0.8"/>
    <text x="605" y="42" text-anchor="middle" font-family="monospace" font-size="9"  fill="#7d8590">CERTS</text>
    <text x="605" y="64" text-anchor="middle" font-family="monospace" font-size="22" font-weight="700" fill="#5DCAA5">3</text>
  </g>
  <g class="k3">
    <rect x="430" y="86" width="230" height="56" rx="6" fill="#161b22" stroke="#EF9F27" stroke-width="0.5" opacity="0.8"/>
    <text x="545" y="104" text-anchor="middle" font-family="monospace" font-size="9"  fill="#7d8590">ACHIEVEMENT RATE</text>
    <text x="545" y="128" text-anchor="middle" font-family="monospace" font-size="22" font-weight="700" fill="#EF9F27">112.43%</text>
  </g>

  <g class="ch">
    <rect x="430" y="154" width="230" height="106" rx="6" fill="#161b22" stroke="#1D9E75" stroke-width="0.5" opacity="0.6"/>
    <text x="441" y="170" font-family="monospace" font-size="9" fill="#7d8590">REVENUE TREND</text>
    <g class="b1"><rect x="448" y="220" width="22" height="28" rx="2" fill="#1D9E75" opacity="0.3"/><rect x="448" y="220" width="22" height="28" rx="2" fill="none" stroke="#1D9E75" stroke-width="0.5"/><text x="459" y="247" text-anchor="middle" font-family="monospace" font-size="8" fill="#5DCAA5">Q1</text></g>
    <g class="b2"><rect x="478" y="207" width="22" height="41" rx="2" fill="#1D9E75" opacity="0.4"/><rect x="478" y="207" width="22" height="41" rx="2" fill="none" stroke="#1D9E75" stroke-width="0.5"/><text x="489" y="247" text-anchor="middle" font-family="monospace" font-size="8" fill="#5DCAA5">Q2</text></g>
    <g class="b3"><rect x="508" y="195" width="22" height="53" rx="2" fill="#1D9E75" opacity="0.5"/><rect x="508" y="195" width="22" height="53" rx="2" fill="none" stroke="#1D9E75" stroke-width="0.5"/><text x="519" y="247" text-anchor="middle" font-family="monospace" font-size="8" fill="#5DCAA5">Q3</text></g>
    <g class="b4"><rect x="538" y="180" width="22" height="68" rx="2" fill="#1D9E75" opacity="0.8"/><rect x="538" y="180" width="22" height="68" rx="2" fill="none" stroke="#1D9E75" stroke-width="0.5"/><text x="549" y="247" text-anchor="middle" font-family="monospace" font-size="8" fill="#1D9E75">Q4</text></g>
    <polyline class="ln" points="459,216 489,204 519,192 549,178" fill="none" stroke="#5DCAA5" stroke-width="1.5"/>
    <circle class="pg" cx="549" cy="178" r="4" fill="#1D9E75"/>
    <circle cx="549" cy="178" r="2" fill="#e6edf3"/>
  </g>

  <g class="a2"><text x="30" y="270" font-family="monospace" font-size="10" fill="#3B6D11">Open to Remote · Egypt · Gulf Region</text></g>
  <text x="650" y="270" text-anchor="end" font-family="monospace" font-size="9" fill="#3B6D11" opacity="0.5">v2.0</text>
</svg>
